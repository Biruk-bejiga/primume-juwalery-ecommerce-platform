services:
  mysql:
    image: mysql:8.4
    container_name: premium-jewellery-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: premium_jewellery
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15

  app:
    build: .
    container_name: premium-jewellery-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/premium_jewellery
      ADMIN_API_KEY: replace-with-a-strong-random-value
      NEXT_PUBLIC_BRAND_NAME: Aurelia Jewels
    ports:
      - "3000:3000"

volumes:
  mysql_data:
